  name: 🛠️ Build & Test

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

  permissions:
    contents: read

  jobs:
    test:
      name: 🧪 Build & Test (${{ matrix.os }})
      runs-on: ${{ matrix.os }}

      strategy:
        matrix:
          os:
            - ubuntu-latest
            - windows-latest
            - macos-latest

      steps:
        - name: 📥 Checkout repository
          uses: actions/checkout@v4

        - name: 🐹 Setup Go
          uses: actions/setup-go@v5
          with:
            go-version: "1.24"
            cache: true

        - name: 📦 Download dependencies
          run: go mod download

        - name: 🎨 Check formatting
          if: runner.os != 'Windows'
          run: |
            test -z "$(gofmt -l .)"

        - name: 📝 Run go vet Lint
          run: go vet ./...

        - name: 🔨 Build
          run: go build -v ./...

        - name: 🔍 Run tests
          run: go test -race -coverprofile=coverage.out -v ./...

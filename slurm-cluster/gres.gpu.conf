# CARAVAN_GPU=real variant (see docker-compose.gpu.yml). c1 has real device
# passthrough. AutoDetect=nvml isn't an option: Ubuntu's slurm-wlm package
# ships only gpu_generic.so/gpu_nrt.so, no gpu_nvml.so. WSL2 GPU
# passthrough also exposes no /dev/nvidia* nodes, only /dev/dxg — so this
# uses gpu/generic with that device file instead of NVML autodetect. c2
# has no passthrough and stays fake/count-only like the default gres.conf.
NodeName=c1 Name=gpu File=/dev/dxg
NodeName=c2 Name=gpu Type=fake File=/var/lib/slurm/fakegpu/gpu[0-3]

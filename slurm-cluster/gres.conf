# Fake GPUs for scheduling tests: not real hardware, but Slurm still needs a
# valid character device per GPU to accept the entry.
#
# A File=-less "gpu" GRES line (just Count=N) is silently dropped on Slurm
# 23.11 ("Ignoring file-less GPU gpu:(null) from final GRES list"), which
# then fails node registration with "gres/gpu count reported lower than
# configured (0 < 4)". The Dockerfile mknods four harmless char devices
# (clones of /dev/null's 1:3) at /var/lib/slurm/fakegpu/gpu[0-3] specifically
# so this File= line has something real to point at.
AutoDetect=off
NodeName=c1 Name=gpu Type=fake File=/var/lib/slurm/fakegpu/gpu[0-3]
NodeName=c2 Name=gpu Type=fake File=/var/lib/slurm/fakegpu/gpu[0-3]

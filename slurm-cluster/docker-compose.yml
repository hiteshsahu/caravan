services:
  slurmctld:
    build: .
    image: caravan-slurm:latest
    command: ["slurmctld"]
    hostname: slurmctld
    container_name: slurmctld
    volumes:
      - ./slurm.conf:/etc/slurm/slurm.conf:ro
      - ./gres.conf:/etc/slurm/gres.conf:ro
      - ./cgroup.conf:/etc/slurm/cgroup.conf:ro
      - slurm_state:/var/spool/slurmctld
    networks: [slurm]
    restart: unless-stopped
    depends_on:
      c1:
        condition: service_healthy
      c2:
        condition: service_healthy

  c1:
    image: caravan-slurm:latest
    command: ["slurmd"]
    hostname: c1
    container_name: c1
    restart: unless-stopped
    # slurmd's cgroup/v2 plugin always targets <cgroup-mount-root>/system.slice
    # for its per-step scope, regardless of IgnoreSystemd. privileged +
    # cgroupns:host give it real cgroup write access, and cgroup_parent "/"
    # keeps this container's own cgroup a direct child of the mount root
    # (matching bare-metal layout) so that target path actually exists.
    privileged: true
    cgroup: host
    cgroup_parent: "/"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f slurmd || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./slurm.conf:/etc/slurm/slurm.conf:ro
      - ./gres.conf:/etc/slurm/gres.conf:ro
      - ./cgroup.conf:/etc/slurm/cgroup.conf:ro
    networks: [slurm]

  c2:
    image: caravan-slurm:latest
    command: ["slurmd"]
    hostname: c2
    container_name: c2
    restart: unless-stopped
    privileged: true
    cgroup: host
    cgroup_parent: "/"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f slurmd || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./slurm.conf:/etc/slurm/slurm.conf:ro
      - ./gres.conf:/etc/slurm/gres.conf:ro
      - ./cgroup.conf:/etc/slurm/cgroup.conf:ro
    networks: [slurm]

networks:
  slurm:

volumes:
  slurm_state:

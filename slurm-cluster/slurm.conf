ClusterName=caravan
SlurmctldHost=slurmctld

SlurmUser=root
AuthType=auth/munge

SlurmctldPort=6817
SlurmdPort=6818

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldPidFile=/run/slurmctld.pid
SlurmdPidFile=/run/slurmd.pid

ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
ReturnToService=2

SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

GresTypes=gpu

AccountingStorageType=accounting_storage/none
JobAcctGatherType=jobacct_gather/none

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# Two fake-GPU compute nodes. Lower CPUs/RealMemory if a node comes up
# invalid/drained — they must not exceed what Docker gives the container.
# Updated to match container-detected hardware so slurmd initializes correctly.
NodeName=c1 NodeAddr=c1 CPUs=7 RealMemory=1941 Gres=gpu:4 State=UNKNOWN
NodeName=c2 NodeAddr=c2 CPUs=7 RealMemory=1941 Gres=gpu:4 State=UNKNOWN
PartitionName=gpu Nodes=c1,c2 Default=YES MaxTime=INFINITE State=UP
